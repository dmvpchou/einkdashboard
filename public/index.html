<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f5ee">
    <title>Leaf2 Usage Board</title>
    <link rel="stylesheet" href="/styles.css?v=20260711-leaf2-fit">
  </head>
  <body>
    <main class="board" aria-live="polite">
      <div class="top-grid">
        <section class="time-panel">
          <div class="date-line" id="dateLine">--</div>
          <div class="clock" id="clock">--:--</div>
        </section>

        <section class="weather-panel" aria-label="Current weather">
          <div class="weather-condition" id="weatherIcon">--</div>
          <div class="temperature" id="temperature">--</div>
          <span class="visually-hidden" id="weatherDescription">--</span>
        </section>
      </div>

      <section class="quote-panel" id="quoteText" aria-label="Daily note">
        簡約是細膩的極致
      </section>

      <section class="usage-grid">
        <article class="usage-card">
          <div class="card-top">
            <span class="section-label">Codex</span>
          </div>
          <div class="usage-main">
            <div>
              <div class="usage-value" id="codexValue">--</div>
              <div class="usage-caption" id="codexCaption">--</div>
            </div>
            <div class="usage-reset">
              <span>重置</span>
              <strong id="codexReset">--</strong>
            </div>
          </div>
          <div class="meter" id="codexMeter" hidden>
            <span id="codexMeterFill"></span>
          </div>
          <div class="usage-stats" id="codexStats"></div>
        </article>

        <article class="usage-card">
          <div class="card-top">
            <span class="section-label">Claude Code</span>
          </div>
          <div class="usage-main">
            <div>
              <div class="usage-value" id="claudeValue">--</div>
              <div class="usage-caption" id="claudeCaption">--</div>
            </div>
            <div class="usage-reset">
              <span>重置</span>
              <strong id="claudeReset">--</strong>
            </div>
          </div>
          <div class="meter" id="claudeMeter" hidden>
            <span id="claudeMeterFill"></span>
          </div>
          <div class="usage-stats" id="claudeStats"></div>
        </article>
      </section>
    </main>
    <script src="/app.js?v=20260711-leaf2-fit"></script>
  </body>
</html>
